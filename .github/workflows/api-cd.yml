name: API CD
on:
  workflow_run:
    workflows: ["API CI"]
    types:
      - completed
    branches:
      - main
 
permissions:
  contents: read
  actions: read

env:
  IMAGE: ghcr.io/michealwmurray/sonderful-api
  WEBAPP: sonderful-api

jobs:
  check-ci:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed
        run: echo "CI passed, starting deployment"

  deploy-dev:
    runs-on: ubuntu-latest
    needs: check-ci
    environment: dev

    steps:
      - name: Deploy to Dev
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ${{ env.WEBAPP }}
          slot-name: dev
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DEV }}
          images: ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}

      - name: Smoke test Dev
        run: |
          sleep 30
          curl --fail https://sonderful-api-dev-hdb8aec2h4cge3fg.germanywestcentral-01.azurewebsites.net/health

  deploy-test:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: test

    steps:
      - name: Deploy to Test
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ${{ env.WEBAPP }}
          slot-name: test
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_TEST }}
          images: ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}

      - name: Smoke test Test
        run: |
          sleep 30
          curl --fail https://sonderful-api-test-e5ddfsd7emckbgb2.germanywestcentral-01.azurewebsites.net/health

  deploy-staging:
    runs-on: ubuntu-latest
    needs: deploy-test
    environment: staging

    steps:
      - name: Deploy to Staging
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ${{ env.WEBAPP }}
          slot-name: staging
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
          images: ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}

      - name: Smoke test Staging
        run: |
          sleep 30
          curl --fail https://sonderful-api-staging-f9fshpgxhfhtdyak.germanywestcentral-01.azurewebsites.net/health

      - name: "Notify Slack: production approval pending"
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_CD_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Production deploy awaiting approval",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🟡 Production deploy awaiting approval" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.event.workflow_run.head_sha }}`" },
                    { "type": "mrkdwn", "text": "*Staging status:*\nDeployed and smoke-tested" },
                    { "type": "mrkdwn", "text": "*Next stage:*\nProduction (requires approval)" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "Review and approve" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "primary"
                    }
                  ]
                }
              ]
            }

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Production
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ${{ env.WEBAPP }}
          slot-name: production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          images: ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}

      - name: Smoke test Production
        run: |
          sleep 30
          curl --fail https://sonderful-api-gwe9hchwhdbcg0h3.germanywestcentral-01.azurewebsites.net/health

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(date +'%Y.%m.%d').${{ github.run_number }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "Deployed to production. Commit: ${{ github.event.workflow_run.head_sha }}" \
            --target "${{ github.event.workflow_run.head_sha }}"

      - name: "Notify Slack: production deploy success"
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_CD_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Production deploy succeeded",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "✅ Production deploy succeeded" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.event.workflow_run.head_sha }}`" },
                    { "type": "mrkdwn", "text": "*Environment:*\nProduction" },
                    { "type": "mrkdwn", "text": "*Run number:*\n${{ github.run_number }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View deployment" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  notify-cd-failure:
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-test, deploy-staging, deploy-production]
    if: failure()
    steps:
      - name: Notify Slack on CD failure
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_CD_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "<!channel> CD pipeline failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🚨 CD pipeline failed" }
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "<!channel> A deployment in the CD pipeline has failed and may require immediate attention." }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Repository:*\n${{ github.repository }}" },
                    { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.event.workflow_run.head_sha }}`" },
                    { "type": "mrkdwn", "text": "*Workflow:*\n${{ github.workflow }}" },
                    { "type": "mrkdwn", "text": "*Run number:*\n${{ github.run_number }}" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View failed run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "danger"
                    }
                  ]
                }
              ]
            }

