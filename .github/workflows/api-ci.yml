name: API CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

defaults:
  run:
    working-directory: Sonderful

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Sonderful.Tests/Sonderful.Tests.csproj

      - name: Build API
        run: dotnet build Sonderful.API/Sonderful.API.csproj --configuration Release --no-restore

      - name: Build tests
        run: dotnet build Sonderful.Tests/Sonderful.Tests.csproj --configuration Release --no-restore

      - name: Lint
        run: >
          dotnet format Sonderful.API/Sonderful.API.csproj
          --verify-no-changes
          --severity warn
          --exclude "**/Migrations/**"

      - name: Lint tests
        run: >
          dotnet format Sonderful.Tests/Sonderful.Tests.csproj
          --verify-no-changes
          --severity warn

      - name: Check for vulnerable dependencies
        run: |
          output=$(dotnet list Sonderful.API/Sonderful.API.csproj package --include-transitive --vulnerable)
          echo "$output"
          if echo "$output" | grep -qE "(Critical|High)"; then
            echo "Vulnerable dependencies found."
            exit 1
          fi

      - name: Test with coverage
        run: >
          dotnet test Sonderful.Tests/Sonderful.Tests.csproj
          --configuration Release
          --no-build
          --no-restore
          /p:CollectCoverage=true
          /p:Threshold=70
          /p:ThresholdType=line
          /p:ThresholdStat=total
          /p:ExcludeByFile="**/Migrations/*.cs,**/obj/**/*.cs"

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Sonderful/Sonderful.API/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/sonderful-api:${{ github.sha }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/sonderful-api:${{ github.sha }}
          artifact-name: sbom.spdx.json

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/sonderful-api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
